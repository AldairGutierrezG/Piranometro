<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Irradiancia</title>

<style>

body{
font-family:Arial;
background:#e6eef5;
text-align:center;
margin:0;
}

.container{
background:#f3f3f3;
width:400px;
margin:60px auto;
padding:30px;
border-radius:12px;
box-shadow:0px 4px 10px rgba(0,0,0,0.2);
}

h1{
color:#1e5aa8;
}

input{
width:90%;
padding:12px;
font-size:16px;
margin-top:15px;
border:1px solid #aaa;
border-radius:5px;
}

button{
padding:10px 16px;
font-size:15px;
margin:10px;
background:#2d74da;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1c56a5;
}

.instrumento{
font-size:30px;
font-weight:bold;
margin:15px;
}

</style>
</head>

<body>

<div class="container">

<h1>Calculadora de Irradiancia</h1>

<p>Ing. Braulio Aldair Gutierrez G.</p>

<p>Piranómetro LabVolt</p>

<b>Sensibilidad fija: 10.55 µV/(W/m²)</b>

<br><br>

<input type="number" id="voltaje" placeholder="Voltaje (mV)">

<br>

<button onclick="calcular()">Calcular</button>

<button onclick="obtenerUbicacion()">📍 Obtener ubicación</button>

<div class="instrumento" id="resultado">---</div>

<p>Temperatura estimada: <span id="temp">--</span> °C</p>

<p id="ubicacion">
Ubicación: --
</p>

<br>

<button onclick="guardarDato()">Guardar medición</button>

<button onclick="guardarCSV()">Exportar CSV</button>

</div>

<script>

let datos=[]

let lat=null
let lon=null
let ciudad=""

//-----------------------------------
// CALCULAR IRRADIANCIA
//-----------------------------------

function calcular(){

let mV=parseFloat(document.getElementById("voltaje").value)

if(isNaN(mV)){
alert("Ingrese voltaje")
return
}

let microV=mV*1000

let irradiancia=microV/10.55

irradiancia=irradiancia.toFixed(2)

document.getElementById("resultado").innerText=
irradiancia+" W/m²"

/* temperatura aproximada */

let temp=20+(irradiancia*0.03)

document.getElementById("temp").innerText=
temp.toFixed(1)

}

//-----------------------------------
// OBTENER UBICACIÓN
//-----------------------------------

function obtenerUbicacion(){

navigator.geolocation.getCurrentPosition(

function(pos){

lat=pos.coords.latitude
lon=pos.coords.longitude

buscarCiudad()

},

function(){

alert("No se pudo obtener ubicación")

}

)

}

//-----------------------------------
// BUSCAR CIUDAD (FIX WEBVIEW)
//-----------------------------------

function buscarCiudad(){

fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`,{

headers:{
"User-Agent":"MedidorSolarLabVoltApp"
}

})

.then(r=>r.json())

.then(data=>{

ciudad=
data.address.city||
data.address.town||
data.address.village||
data.address.state||
"Ubicación desconocida"

document.getElementById("ubicacion").innerText=
"Ubicación: "+
lat.toFixed(4)+", "+
lon.toFixed(4)+
", "+
ciudad

})

.catch(()=>{

document.getElementById("ubicacion").innerText=
"Ubicación: "+
lat.toFixed(4)+", "+
lon.toFixed(4)

})

}

//-----------------------------------
// GUARDAR MEDICIÓN
//-----------------------------------

function guardarDato(){

let irr=document.getElementById("resultado").innerText

if(irr==="---"){
alert("Primero calcule irradiancia")
return
}

let fecha=new Date().toLocaleString()

datos.push({

fecha:fecha,
irradiancia:irr,
temp:document.getElementById("temp").innerText,
lat:lat,
lon:lon,
ciudad:ciudad

})

alert("Medición guardada")

}

//-----------------------------------
// EXPORTAR CSV (FUNCIONA EN APK)
//-----------------------------------

function guardarCSV(){

if(datos.length==0){

alert("No hay datos")

return

}

let csv="Fecha,Irradiancia,Temperatura,Latitud,Longitud,Ciudad\n"

datos.forEach(d=>{

csv+=`${d.fecha},${d.irradiancia},${d.temp},${d.lat},${d.lon},${d.ciudad}\n`

})

let blob=new Blob([csv],{type:"text/csv"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url
a.download="mediciones_solares.csv"

document.body.appendChild(a)

a.click()

document.body.removeChild(a)

URL.revokeObjectURL(url)

}

</script>

</body>
</html>
